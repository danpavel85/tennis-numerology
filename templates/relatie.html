<!DOCTYPE html>
<html>

<head>

<title>Relationship Compatibility</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body style="background:#f4f6fb">

<div class="container py-5">

<h2 class="text-center mb-4">❤️ Compatibility Calculator</h2>

<a href="/" class="btn btn-secondary mb-3">Home</a>

<div class="card p-4">

<form method="post">

<div class="row">

<div class="col-md-6">

<label>Nume persoana 1</label>
<input class="form-control mb-3" name="name1">

<label>Data nasterii</label>
<input type="date" class="form-control mb-3" name="birth1">

</div>

<div class="col-md-6">

<label>Nume persoana 2</label>
<input class="form-control mb-3" name="name2">

<label>Data nasterii</label>
<input type="date" class="form-control mb-3" name="birth2">

</div>

</div>

<label>Data inceperii relatiei</label>
<input type="date" class="form-control mb-3" name="relation_date">

<button class="btn btn-danger btn-lg">Calculeaza compatibilitatea</button>

</form>

</div>


{% if result %}

<div class="card mt-4 p-4">

<h3 class="text-center">Compatibilitate: {{result.score}}%</h3>

<p class="text-center">{{result.interpretation}}</p>

<canvas id="chart"></canvas>

<hr>

<p>Probabilitate casatorie: {{result.marriage}}%</p>
<p>Probabilitate divort: {{result.divorce}}%</p>

<p>Numarul relatiei: {{result.relation_number}}</p>

<p>Analiza karmica: {{result.karmic}}</p>

</div>


<script>

new Chart(document.getElementById('chart'),{

type:'radar',

data:{
labels:['Emotional','Sexual','Mental','Spiritual','Communication','Trust','Passion','Stability','Friendship','Values','Lifestyle','Attraction'],

datasets:[{

label:'Compatibilitate',

data:[
{{result.emotional}},
{{result.sexual}},
{{result.mental}},
{{result.spiritual}},
{{result.communication}},
{{result.trust}},
{{result.passion}},
{{result.stability}},
{{result.friendship}},
{{result.values}},
{{result.lifestyle}},
{{result.attraction}}
]

}]

}

});

</script>

{% endif %}

</div>

</body>

</html>
