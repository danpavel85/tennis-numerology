<!DOCTYPE html>
<html lang="ro">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Analiza Numerologica Relatie</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body style="background:#f4f6fb">

<div class="container py-5">

<h2 class="text-center mb-4">❤️ Analiza Numerologica Relatie</h2>

<a href="/" class="btn btn-secondary mb-3">Home</a>

<div class="card p-4">

<form method="post">

<div class="row">

<div class="col-md-6">

<h5>Persoana 1</h5>

<label>Nume complet</label>
<input class="form-control mb-2" name="name1">

<label>Nume dupa casatorie (optional)</label>
<input class="form-control mb-2" name="married1">

<label>Data nasterii</label>
<input type="date" class="form-control mb-2" name="birth1">

<label>Ora nasterii (optional)</label>
<input type="time" class="form-control mb-2" name="time1">

<label>Locul nasterii (optional)</label>
<input class="form-control mb-3" name="place1">

</div>

<div class="col-md-6">

<h5>Persoana 2</h5>

<label>Nume complet</label>
<input class="form-control mb-2" name="name2">

<label>Nume dupa casatorie (optional)</label>
<input class="form-control mb-2" name="married2">

<label>Data nasterii</label>
<input type="date" class="form-control mb-2" name="birth2">

<label>Ora nasterii (optional)</label>
<input type="time" class="form-control mb-2" name="time2">

<label>Locul nasterii (optional)</label>
<input class="form-control mb-3" name="place2">

</div>

</div>

<label>Data inceperii relatiei</label>
<input type="date" class="form-control mb-3" name="relation_date">

<button class="btn btn-danger btn-lg">Genereaza analiza relatie</button>

</form>

</div>

{% if result %}

<div class="card mt-4 p-4">

<h3 class="text-center">Scor compatibilitate: {{result.score}}%</h3>

<p class="text-center">{{result.interpretation}}</p>

</div>

{% endif %}

</div>

</body>

</html>
